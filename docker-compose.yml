# Produkční Docker Compose — kompletní AUTORITATIVNÍ instance (db + migrace + web).
# Služby: db (PostgreSQL) → migrate (jednorázová migrace) → web.
#
# Provozní modely (stejný image):
#   1) AUTORITATIVNÍ server (doporučeno) — měřicí zařízení (notebooky/tablety)
#      míří prohlížečem na tento web. Data sdílená → multi-device + failover
#      (spadne notebook → otevři jiný, přihlas se, měř dál; server má vše).
#      Pro místa bez internetu pusť tentýž compose na LAN krabici; zařízení se
#      připojí přes lokální WiFi.
#   2) Cloudové read-only zrcadlo — plněné pushem z jiné (lokální) instance přes
#      /api/sync; k tomu nastav SYNC_TOKEN (stejný na obou).
#
# POVINNÉ: AUTH_SECRET (openssl rand -base64 32).
# Volitelné: SYNC_TOKEN (jen pro režim 2 — zrcadlo), POSTGRES_* (default casomira).

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  environment: &app-env
    NODE_ENV: production
    DATABASE_URL: ${DATABASE_URL:-postgres://casomira:casomira@db:5432/casomira}
    AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET musí být nastaven (openssl rand -base64 32)}
    # Jen pro režim cloudového zrcadla (autorizace pushe /api/sync). Autoritativní
    # server ho nepotřebuje → volitelný.
    SYNC_TOKEN: ${SYNC_TOKEN:-}
    APP_BASE_URL: ${APP_BASE_URL:-https://casomira.example.cz}
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casomira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casomira}
      POSTGRES_DB: ${POSTGRES_DB:-casomira}
    volumes:
      - casomira-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-casomira} -d ${POSTGRES_DB:-casomira}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    <<: *app
    command: ["npm", "run", "db:migrate"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    <<: *app
    command: ["npm", "run", "start"]
    environment:
      <<: *app-env
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  casomira-db:
